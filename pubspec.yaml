name: space_app
description: "A Flutter application that allows users to explore planets in the solar system with interactive animations, planet details, and 3D models."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_3d_controller: ^2.2.0
  smooth_page_indicator: ^1.2.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/models/
